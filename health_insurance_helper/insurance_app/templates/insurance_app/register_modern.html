{% extends 'insurance_app/base_modern.html' %}

{% block title %}Register - HealthGuard Insurance{% endblock %}

{% block content %}
<style>
    .register-section {
        min-height: 90vh;
        display: flex;
        align-items: center;
        background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
        padding: 40px 0;
    }

    .register-container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(30, 58, 138, 0.15);
        overflow: hidden;
    }

    .register-header {
        background: linear-gradient(135deg, var(--secondary) 0%, #06b6d4 100%);
        color: white;
        padding: 40px 30px;
        text-align: center;
    }

    .register-header h2 {
        margin-bottom: 0.5rem;
        font-size: 1.8rem;
    }

    .register-header p {
        opacity: 0.9;
        margin: 0;
    }

    .register-body {
        padding: 40px;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.75rem;
        color: var(--primary);
        font-weight: 600;
        font-size: 0.95rem;
    }

    .form-group input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.3s ease;
        box-sizing: border-box;
    }

    .form-group input:focus {
        outline: none;
        border-color: var(--secondary);
        box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
    }

    .register-button {
        background: linear-gradient(135deg, var(--secondary) 0%, #06b6d4 100%);
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 1rem;
        width: 100%;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 1rem;
    }

    .register-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
    }

    .register-footer {
        padding: 20px 40px;
        background: #f8fafc;
        text-align: center;
        border-top: 1px solid #e2e8f0;
        color: #475569;
    }

    .register-footer a {
        color: var(--secondary);
        text-decoration: none;
        font-weight: 600;
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
    }

    @media (max-width: 576px) {
        .form-row {
            grid-template-columns: 1fr;
        }
    }
</style>

<div class="register-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="register-container">
                    <div class="register-header">
                        <h2><i class="fas fa-user-plus"></i> Create Account</h2>
                        <p>Join HealthGuard today</p>
                    </div>
                    <div class="register-body">
                        <form method="POST" action="{% url 'register' %}">
                            {% csrf_token %}
                            
                            <div class="form-group">
                                <label for="username">Username</label>
                                <input type="text" id="username" name="username" required placeholder="Choose a unique username">
                            </div>
                            
                            <div class="form-group">
                                <label for="email">Email Address</label>
                                <input type="email" id="email" name="email" required placeholder="your@email.com">
                            </div>
                            
                            <div class="form-group">
                                <label for="password">Password</label>
                                <input type="password" id="password" name="password" required placeholder="Create a strong password">
                            </div>
                            
                            <div class="form-group">
                                <label for="password_confirm">Confirm Password</label>
                                <input type="password" id="password_confirm" name="password_confirm" required placeholder="Confirm your password">
                            </div>

                            <div style="background: #f0fdf4; border-left: 4px solid var(--secondary); padding: 12px; border-radius: 4px; margin: 1.5rem 0; color: #065f46; font-size: 0.9rem;">
                                <i class="fas fa-shield-alt"></i> Your information is secure and encrypted
                            </div>

                            <button type="submit" class="register-button">
                                <i class="fas fa-user-check"></i> Create Account
                            </button>
                        </form>
                    </div>
                    <div class="register-footer">
                        <p style="margin: 0;">Already have an account? <a href="{% url 'login' %}">Sign In</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
