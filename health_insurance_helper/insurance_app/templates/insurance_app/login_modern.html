{% extends 'insurance_app/base_modern.html' %}

{% block title %}User Login - HealthGuard Insurance{% endblock %}

{% block content %}
<style>
    .login-section {
        min-height: 90vh;
        display: flex;
        align-items: center;
        background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
        padding: 40px 0;
    }

    .login-container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(30, 58, 138, 0.15);
        overflow: hidden;
    }

    .login-header {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
        color: white;
        padding: 40px 30px;
        text-align: center;
    }

    .login-header h2 {
        margin-bottom: 0.5rem;
        font-size: 1.8rem;
    }

    .login-header p {
        opacity: 0.9;
        margin: 0;
    }

    .login-body {
        padding: 40px;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.75rem;
        color: var(--primary);
        font-weight: 600;
        font-size: 0.95rem;
    }

    .form-group input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    .form-group input:focus {
        outline: none;
        border-color: var(--primary-light);
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }

    .login-button {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 1rem;
        width: 100%;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 1rem;
    }

    .login-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(30, 58, 138, 0.3);
    }

    .login-footer {
        padding: 20px 40px;
        background: #f8fafc;
        text-align: center;
        border-top: 1px solid #e2e8f0;
        color: #475569;
    }

    .login-footer a {
        color: var(--primary-light);
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .login-footer a:hover {
        color: var(--primary);
    }

    .divider {
        display: flex;
        align-items: center;
        margin: 2rem 0;
        color: #cbd5e1;
    }

    .divider::before,
    .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: #e2e8f0;
    }

    .divider span {
        margin: 0 1rem;
        color: #94a3b8;
        font-size: 0.9rem;
    }
</style>

<div class="login-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="login-container">
                    <div class="login-header">
                        <h2><i class="fas fa-user-circle"></i> User Login</h2>
                        <p>Access your HealthGuard account</p>
                    </div>
                    <div class="login-body">
                        <form method="POST" action="{% url 'login' %}">
                            {% csrf_token %}
                            
                            <div class="form-group">
                                <label for="username">Username</label>
                                <input type="text" id="username" name="username" required placeholder="Enter your username">
                            </div>
                            
                            <div class="form-group">
                                <label for="password">Password</label>
                                <input type="password" id="password" name="password" required placeholder="Enter your password">
                            </div>
                            
                            <button type="submit" class="login-button">
                                <i class="fas fa-sign-in-alt"></i> Sign In
                            </button>
                        </form>

                        <div class="divider">
                            <span>OR</span>
                        </div>

                        <div style="text-align: center; margin-top: 1.5rem;">
                            <p style="color: #475569; margin-bottom: 1rem;">Don't have an account?</p>
                            <a href="{% url 'register' %}" style="background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); color: var(--primary); padding: 12px 30px; border-radius: 8px; text-decoration: none; font-weight: 600; display: inline-block; transition: all 0.3s ease;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 10px 25px rgba(251, 191, 36, 0.3)'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none'">
                                <i class="fas fa-user-plus"></i> Create Account
                            </a>
                        </div>
                    </div>
                    <div class="login-footer">
                        <p style="margin: 0;">Are you an admin? <a href="{% url 'admin_login' %}">Admin Login</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
