{% extends "insurance_app/base.html" %}

{% block title %}Login - Health Insurance Helper{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 3rem auto;">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 2.5rem; color: #1e3a8a; font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 2.2rem;">Sign In to Your Account</h2>
        
        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn" style="width: 100%; margin-bottom: 1.5rem; padding: 1.1rem;">Login</button>
        </form>
        
        <p style="text-align: center; font-family: 'Poppins', sans-serif; font-weight: 500; color: #475569;">
            Don't have an account? <a href="{% url 'register' %}" style="color: #1e3a8a; text-decoration: none; font-weight: 700;">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
